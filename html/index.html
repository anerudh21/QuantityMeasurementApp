<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement - Coral Pro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <input type="radio" name="unit-toggle" id="type-length" checked>
    <input type="radio" name="unit-toggle" id="type-weight">
    <input type="radio" name="unit-toggle" id="type-temp">
    <input type="radio" name="unit-toggle" id="type-volume">

    <div class="app-wrapper">
        <header class="main-header">
            <h1>Welcome To Quantity Measurement</h1>
        </header>

        <main class="content-card">
            <section class="control-section">
                <p class="section-label">CHOOSE TYPE</p>
                <div class="grid-layout">
                    <label for="type-length" class="card-option" id="btn-length">
                        <span class="icon">📏</span>
                        <p>Length</p>
                    </label>
                    <label for="type-weight" class="card-option" id="btn-weight">
                        <span class="icon">⚖️</span>
                        <p>Weight</p>
                    </label>
                    <label for="type-temp" class="card-option" id="btn-temp">
                        <span class="icon">🌡️</span>
                        <p>Temperature</p>
                    </label>
                    <label for="type-volume" class="card-option" id="btn-volume">
                        <span class="icon">🥛</span>
                        <p>Volume</p>
                    </label>
                </div>
            </section>

            <section class="control-section">
                <p class="section-label">CHOOSE ACTION</p>
                <div class="action-flex">
                    <button class="action-tab active">Comparison</button>
                    <button class="action-tab">Conversion</button>
                    <button class="action-tab">Arithmetic</button>
                </div>
            </section>

            <div class="display-container">
                <div class="unit-panel" id="panel-length">
                    <div class="input-row">
                        <div class="field-box">
                            <p class="label">FROM</p>
                            <input type="text" value="1">
                            <select><option>Kilometer</option><option>Meter</option></select>
                        </div>
                        <div class="field-box">
                            <p class="label">TO</p>
                            <input type="text" value="1000">
                            <select><option>Meters</option><option>Centimeters</option></select>
                        </div>
                    </div>
                </div>

                <div class="unit-panel" id="panel-weight">
                    <div class="input-row">
                        <div class="field-box">
                            <p class="label">FROM</p>
                            <input type="text" value="1">
                            <select><option>Kilogram</option></select>
                        </div>
                        <div class="field-box">
                            <p class="label">TO</p>
                            <input type="text" value="1000">
                            <select><option>Grams</option></select>
                        </div>
                    </div>
                </div>

                <div class="unit-panel" id="panel-temp">
                    <div class="input-row">
                        <div class="field-box">
                            <p class="label">FROM</p>
                            <input type="text" value="0">
                            <select><option>Celsius</option></select>
                        </div>
                        <div class="field-box">
                            <p class="label">TO</p>
                            <input type="text" value="32">
                            <select><option>Fahrenheit</option></select>
                        </div>
                    </div>
                </div>

                <div class="unit-panel" id="panel-volume">
                    <div class="input-row">
                        <div class="field-box">
                            <p class="label">FROM</p>
                            <input type="text" value="1">
                            <select><option>Litre</option></select>
                        </div>
                        <div class="field-box">
                            <p class="label">TO</p>
                            <input type="text" value="1000">
                            <select><option>Millilitres</option></select>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
